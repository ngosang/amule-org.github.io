# Landing page — what is aMule
whatis_title: "What is aMule?"
whatis_p1: "aMule is a free, GPL-licensed peer-to-peer file-sharing client for the <strong>eD2k</strong> and <strong>Kademlia</strong> networks. It's compatible with eMule and runs natively on Linux, macOS, and Windows. The same on-disk state, the same protocol, one binary per major desktop."
whatis_p2: "After a long quiet period, the project is back under active maintenance — focused not just on bug fixes and modernization, but on dramatic <strong>throughput improvements</strong> that matter directly for any P2P client."

