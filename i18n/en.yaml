# Landing page — highlights section
hl_title: "3.0.0 highlights"
hl_changelog: "Full 3.0.0 changelog →"
hl_p2p_label: "Peer-to-peer download throughput"
hl_p2p_detail: "Disk I/O off the main thread, ASIO/EPOLLET races fixed, throttlers replaced with proper token-bucket limiters."
hl_p2p_see: "See the numbers →"
hl_emule_label: "vs eMule 0.70b on Windows"
hl_emule_detail: "aMule 3.0.0 sustains ~106 MB/s on upload (vs 22 MB/s eMule) and ~39 MB/s on download (vs 20 MB/s eMule), same UTM hardware."
hl_native_num: "Native"
hl_caps_num: "Real caps"
hl_cmake_label: "Modern build system"
hl_cmake_detail: "Autotools removed entirely. Single CMake build, minimum CMake 3.10, minimum wxWidgets 3.2.0."
hl_native_label: "Binaries for every desktop"
hl_native_detail: "AppImage, Flatpak, macOS Universal2 .dmg, Windows portable .zip — x86_64 and ARM64 where the platform supports it."
hl_https_label: "Server lists, version checks"
hl_https_detail: "Hand-rolled TLS replaced with <code>wxWebRequest</code>. Server-met downloads from modern HTTPS endpoints work again."
hl_caps_label: "Bandwidth limiting that works"
hl_caps_detail: "Both upload and download throttlers rewritten as proper token-bucket limiters. <code>MaxUpload=0</code> finally means literal unlimited."

# Landing page — benchmarks section
bench_title: "Throughput, measured"
bench_lead: "3.0.0 vs 2.3.3 on the same hardware. Single eD2k peer downloading a 30 GB file from a Linux seeder over a local LAN, sustained over the last 30 s of a 90 s window."
bench_vs_heading: "vs eMule 0.70b · Windows"
bench_methodology: "Methodology: identical hardware and network for both versions, peer-to-peer between two daemons (no real-network sources). 2.3.3 is approximated by master at the last commit before the throughput rewrites began; the eD2k wire-level path between that commit and 2.3.3 is unchanged. Per-platform breakdown of the seeder-side and leecher-side contributions in the"
