# Landing page — highlights section
hl_title: "Novedades de 3.0.0"
hl_changelog: "Registro de cambios completo de 3.0.0 →"
hl_p2p_label: "Rendimiento de descarga P2P"
hl_p2p_detail: "E/S de disco fuera del hilo principal, carreras ASIO/EPOLLET corregidas, aceleradores reemplazados por limitadores de token-bucket apropiados."
hl_p2p_see: "Ver los números →"
hl_emule_label: "vs eMule 0.70b en Windows"
hl_emule_detail: "aMule 3.0.0 mantiene ~106 MB/s en subida (vs 22 MB/s de eMule) y ~39 MB/s en bajada (vs 20 MB/s de eMule), mismo hardware UTM."
hl_native_num: "Nativo"
hl_caps_num: "Límites reales"
hl_cmake_label: "Sistema de compilación moderno"
hl_cmake_detail: "Autotools eliminado por completo. Una sola compilación CMake, versión mínima CMake 3.10, versión mínima wxWidgets 3.2.0."
hl_native_label: "Binarios para cada escritorio"
hl_native_detail: "AppImage, Flatpak, macOS Universal2 .dmg, Windows portable .zip — x86_64 y ARM64 donde la plataforma lo soporta."
hl_https_label: "Listas de servidores y comprobación de versiones"
hl_https_detail: "TLS artesanal reemplazado por <code>wxWebRequest</code>. Las descargas de server-met desde endpoints HTTPS modernos vuelven a funcionar."
hl_caps_label: "Limitación de ancho de banda que funciona"
hl_caps_detail: "Los aceleradores de subida y bajada reescritos como limitadores de token-bucket apropiados. <code>MaxUpload=0</code> significa por fin literalmente ilimitado."

# Landing page — benchmarks section
bench_title: "Rendimiento, medido"
bench_lead: "3.0.0 vs 2.3.3 en el mismo hardware. Un par eD2k descargando un archivo de 30 GB desde un seeder Linux por red local, sostenido durante los últimos 30 s de una ventana de 90 s."
bench_vs_heading: "vs eMule 0.70b · Windows"
bench_methodology: "Metodología: hardware y red idénticos para ambas versiones, par a par entre dos daemons (sin fuentes de red real). La versión 2.3.3 se aproxima mediante master en el último commit antes de que comenzaran las reescrituras de rendimiento; la ruta de protocolo eD2k entre ese commit y 2.3.3 no ha cambiado. Desglose por plataforma de las contribuciones del seeder y el leecher en la"
