# Landing page — what is aMule
whatis_title: "¿Qué es aMule?"
whatis_p1: "aMule es un cliente de intercambio de archivos P2P, libre y con licencia GPL, para las redes <strong>eD2k</strong> y <strong>Kademlia</strong>. Es compatible con eMule y funciona de forma nativa en Linux, macOS y Windows. El mismo estado en disco, el mismo protocolo, un binario por escritorio principal."
whatis_p2: "Tras un largo período de inactividad, el proyecto está de nuevo bajo mantenimiento activo — centrado no solo en correcciones de errores y modernización, sino en una <strong>mejora drástica del rendimiento</strong> que importa directamente a cualquier cliente P2P."

