name: Build Check

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check translation base files are in sync
        run: |
          npm run write-translations
          git diff --exit-code i18n/en || {
            echo "::error::i18n/en is out of sync. Run 'npm run write-translations' and commit the changes."
            exit 1
          }

      - name: Build Docusaurus
        run: npm run build
