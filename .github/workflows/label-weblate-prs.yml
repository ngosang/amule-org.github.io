name: Label Weblate PRs

# Weblate (hosted.weblate.org) opens pull requests as the GitHub user "weblate".
# This workflow tags those PRs with the "translation" label automatically.
# pull_request_target is required because Weblate opens the PR from a fork, so a
# plain pull_request token would be read-only and unable to add the label. No PR
# code is checked out or executed here, so pull_request_target is safe.

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  label:
    if: github.event.pull_request.user.login == 'weblate'
    runs-on: ubuntu-24.04
    steps:
      - name: Add "translation" label
        uses: actions/github-script@v7
        with:
          script: |
            const name = 'translation';
            // Fail the workflow if the label does not exist (getLabel throws 404).
            await github.rest.issues.getLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name,
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: [name],
            });
